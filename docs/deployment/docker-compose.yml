# TeslaMate MCP — Docker Compose snippet
# Add this to your existing teslamate docker-compose.yml

services:
  teslamate-mcp:
    image: ghcr.io/<YOUR-GITHUB-USERNAME>/teslamate-mcp:latest
    container_name: teslamate-mcp
    restart: always
    ports:
      - "30002:8080"
    environment:
      # TeslaMate database (same values as your teslamate service)
      - TESLAMATE_DB_HOST=database
      - TESLAMATE_DB_PORT=5432
      - TESLAMATE_DB_USER=teslamate
      - TESLAMATE_DB_PASS=secret
      - TESLAMATE_DB_NAME=teslamate
      # HTTP server mode
      - MCP_TRANSPORT=streamable-http
      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=8080
      # Timezone (default Asia/Shanghai)
      - TIMEZONE=Asia/Shanghai
      # Units and currency
      - USE_METRIC_UNITS=true      # true = km/°C/¥, false = mi/°F/$
      - TESLA_ELECTRICITY_RATE_RMB=0.6
      # Vehicle
      - TESLA_CAR_ID=1
      - TESLA_BATTERY_KWH=75
      - TESLA_BATTERY_RANGE_KM=525
      # Optional TPMS thresholds
      # - TESLA_TPMS_MIN_THRESHOLD=2.0
      # - TESLA_TPMS_MAX_THRESHOLD=2.5
      # Optional query limits (set to -1 for unlimited)
      # - TESLA_LIMIT_DRIVES=50
      # - TESLA_LIMIT_CHARGING=50
      # - TESLA_LIMIT_TRIP_CATEGORIES=100
      # - TESLA_LIMIT_BATTERY_HEALTH=24
      # - TESLA_LIMIT_STATE_HISTORY=100
      # - TESLA_LIMIT_VAMPIRE_DRAIN=20
    depends_on:
      - database
